body:
  text: 宫觀古者王侯之居皆曰宫城門之兩旁高樓謂之觀殿堂分東西階連以門廡宗廟亦然今天尊殿與大成殿同古之制也詩曰雍雍在宫傳曰遂登觀臺醮壇古者祭皆有壇後世州郡有社稷壇記曰壇而不屋古醮壇在野今於屋下從簡也鐘磬古者祭樂有編鐘編磬每架十六以應十二律及四宫清聲又有特懸鐘特懸磬特懸者獨懸也今洞案金鐘玉磬又有大鐘等皆本諸此其大銅磬本諸擊缶周禮鳧氏爲鐘磬氏爲磬香燈古者祭祀有燔燎至漢武帝祠太一始用香燈禮記曰既奠然後炳音熱蕭神祇古有重黎氏能降天神地祇書曰乃命重黎絶地天通周禮春官冬至奏樂於圓丘樂六變而天神皆降夏至奏樂方澤樂六變地祇皆出餅果附酒古者祭用黍稷犧牲梁武帝以麪爲犠性代之唐玄宗又以餅餌代之周禮籩人掌棗栗菱芡又有糗餅粉餈又酒正掌五齊三酒帳幕古者宫室皆有幕帟周禮幕人掌之法服古者祭祀法服有中單蔽膝佩裳之屬今法服乃其流也孟子曰衣服不備不敢以祭禮記曰古之君子必佩玉冠裳古者士大夫皆有冠但纓而不簪唯弁冕簪纓全夫子戴章甫冠曰吾長於宋故冠宋之冠莊子曰原憲華冠藜杖即樺皮冠也禮記有侈袂大袖衣也道衣其類也唐李泌爲道士賜紫後人因以爲常直領者取其蕭散之意也圭簡古之公侯皆執圭周禮有桓圭信音身圭躬圭禮記士執魚須音班文竹木簡之類也位牌古者祭宗廟有木主祭社稷有石主見禮記今位牌即其類也符簡古者以竹二尺爲簡以皮連穿之又有以木片者謂之牘今符簡象此也春秋序曰小事簡牘而已孔子修春秋筆則筆削則削是木版也古者召命有符節符以竹片爲之今黃紙召神符代竹也人形符象使者也步虛古者祭祀歌樂章或歌毛詩今法事長吟本諸此也書曰聲依永律和聲章表古者祭祀有祝版後世用紙也書曰史乃册祝周禮大宗伯掌其祝號盛奏方函代版匣也殷浩寄書誤達空函是木匣也跪拜周禮拜有九等今稽首周法也書曰拜稽首禮記曰受立不跪法尺古者祓除不祥用桃枝后羿死於桃棒故後世逐鬼用之今天蓬尺是其類也周禮曰巫祝桃茢法劒古之士大夫皆佩劒漢書劒履上殿周禮有救日月之弓矢此其流也勑水雨師清塵之義也方綵古者祭五帝各隨其方色五方信綵是也禁祝古以呪字作祝字從口旁乃後人俗字也成湯祝網果羸祝螟蛉即此意也符文周禮禳祅音妖鳥者以方書十日之號十二月之號十二歳之號懸樹上即去古人用篆宇今之符文猶似之也鋪燈古者倉頡制字而天雨粟鬼夜哭故道法劃地爲獄以米爲界後世凡鋪燈皆用米本諸此也附體古來祭必有尸尸者以孫爲之服其徂之服坐于神位之席又謂之嘏禮記曰祝以孝吿嘏以慈吿今之薦先亡而借體通傳者本諸此也手罏古者灌獻之禮用圭瓉瓉之形如盤柄象圭盛酒其中執瓉則不執圭今道士執手罏則不執簡亦此意也帝鐘古之祀神舞者執鐃帝鐘鐃之小者耳氣訣道書作炁字取炁之道呼吸陰陽之義也易畧例曰命宫而商應修下而高者降鼓舞盡神之義也齊女號而起風鄒衍哭而降霜吹律而和氣至皆此類也令牌周禮牙璋以起軍旅漢銅虎符上圓下方刻五牙文若垂露狀背文作一坐虎形銘其旁曰如古牙璋作虎符今召將用令牌此法也旛幢周禮有旌旄旃旆之屬此其製也雲璈古者祭祀有樂此倣之也其常高於常樂全用清聲達於天地手執者象天樂可遊行而奏也禱疾語曰子疾病子路請禱尚書武王疾周公立三壇以禱之晴雨附禳灾古有崇雩之祭水旱之祭也成湯以身代犧性而禱於桑林之野董仲舒春秋繁露有請雨止雨法隨日辰造五色龍各有法式此不再具禳火春秋昭公十八年宋衛陳鄭同日火子産爲火故大爲社祓禳於四方振除火災休糧孔子家語曰食氣者神明而壽食穀者智慧而巧不食者不死道士孔子曰士志於道而恥惡衣惡食者未足與議也道書援神契
