front:
  text: 道書援神契序楹五世之議老子教者皆曰異端其初本於儒而末之流自異也儒不可謂之教天下常道也堯舜禹湯文武周公孔子相繼而作何教之云周道衰禮樂廢而俗多詐視孔子之道若與時異因指爲教其本諸此老子與孔子同時最號知禮孔子常問以禮老子以道莫行於亂世潔己去國務爲清虚孔子憫道之不行斯文將䘮歷聘諸國其進退不同衣服禮法未嘗異也後世孔子徒之服隨國俗變老子徒之服不與俗移故今之道士服類古之儒服也至於修養性命則本乎易醮祭鬼神則本乎周禮春官宗伯符檄冠佩又未嘗不本乎古之制也因末流之𡚁列于巫祝作是書而大之本其源流凡三十四條名之曰道書援神契大德九年序道書援神契
